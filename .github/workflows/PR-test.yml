name: PR Scala Tests

on:
  pull_request:
    branches:
      - main
    paths:
      - '**.scala'
      - 'build.sbt'
      - 'project/**'
      - '.github/workflows/pr-tests.yml'

jobs:
  test:
    name: Run sbt Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'sbt'

      - name: Run Tests
        run: sbt clean test